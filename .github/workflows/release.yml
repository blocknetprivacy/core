name: Build Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  VERSION: "0.7.0"

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Build Rust library
        run: cd crypto-rs && cargo build --release
      
      - name: Build Go binary
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o blocknet .
      
      - name: Package
        run: |
          mkdir -p dist
          cp blocknet dist/
          cd dist && zip -q ../blocknet-amd64-linux-${{ env.VERSION }}.zip blocknet
      
      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-amd64-linux-${{ env.VERSION }}
          path: blocknet-amd64-linux-${{ env.VERSION }}.zip

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      
      - name: Build Rust library
        run: cd crypto-rs && cargo build --release
      
      - name: Build Go binary
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o blocknet .
      
      - name: Package
        run: |
          mkdir -p dist
          cp blocknet dist/
          cd dist && zip -q ../blocknet-arm64-darwin-${{ env.VERSION }}.zip blocknet
      
      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-arm64-darwin-${{ env.VERSION }}
          path: blocknet-arm64-darwin-${{ env.VERSION }}.zip

  build-windows-amd64:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-go
            zip
      
      - name: Build Rust library
        run: cd crypto-rs && cargo build --release
      
      - name: Build Go binary
        run: CGO_ENABLED=1 go build -ldflags="-s -w" -o blocknet.exe .
      
      - name: Package
        run: |
          mkdir -p dist
          cp blocknet.exe dist/
          cd dist && zip -q ../blocknet-amd64-windows-${{ env.VERSION }}.zip blocknet.exe
      
      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-amd64-windows-${{ env.VERSION }}
          path: blocknet-amd64-windows-${{ env.VERSION }}.zip

  build-android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install Rust Android target
        run: rustup target add aarch64-linux-android

      - name: Set NDK toolchain path
        run: |
          NDK=$ANDROID_NDK_LATEST_HOME
          echo "NDK_TOOLCHAIN=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK" >> $GITHUB_ENV

      - name: Build Rust library for Android
        run: |
          CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER="${NDK_TOOLCHAIN}/aarch64-linux-android21-clang" \
          CC_aarch64_linux_android="${NDK_TOOLCHAIN}/aarch64-linux-android21-clang" \
          AR_aarch64_linux_android="${NDK_TOOLCHAIN}/llvm-ar" \
            cargo build --manifest-path crypto-rs/Cargo.toml --target aarch64-linux-android --release

      - name: Stage library for CGO
        run: |
          mkdir -p crypto-rs/target/release
          cp crypto-rs/target/aarch64-linux-android/release/libblocknet_crypto.a crypto-rs/target/release/libblocknet_crypto.a

      - name: Build shared library (.so)
        run: |
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          CC="${NDK_TOOLCHAIN}/aarch64-linux-android21-clang" \
            go build -buildmode=c-shared -ldflags="-s -w -checklinkname=0" -o libblocknet.so .

      - name: Build standalone binary
        run: |
          CGO_ENABLED=1 GOOS=android GOARCH=arm64 \
          CC="${NDK_TOOLCHAIN}/aarch64-linux-android21-clang" \
            go build -ldflags="-s -w -checklinkname=0" -o blocknet-android-arm64 .

      - name: Package
        run: |
          mkdir -p dist
          cp libblocknet.so libblocknet.h blocknet-android-arm64 dist/
          cd dist && zip -q ../blocknet-arm64-android-${{ env.VERSION }}.zip libblocknet.so libblocknet.h blocknet-android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-arm64-android-${{ env.VERSION }}
          path: blocknet-arm64-android-${{ env.VERSION }}.zip

  create-checksums:
    needs: [build-linux-amd64, build-macos-arm64, build-windows-amd64, build-android-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: releases
          merge-multiple: true
      
      - name: Generate checksums
        run: |
          cd releases
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt
      
      - uses: actions/upload-artifact@v4
        with:
          name: blocknet-releases-${{ env.VERSION }}
          path: releases/

  release:
    needs: create-checksums
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: blocknet-releases-${{ env.VERSION }}
          path: releases
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/*
          draft: false
          prerelease: false
